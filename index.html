<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%231a1a2e'/%3E%3Crect x='2' y='2' width='5' height='5' fill='%2322d3ee'/%3E%3Crect x='9' y='2' width='5' height='5' fill='%23a855f7'/%3E%3Crect x='2' y='9' width='5' height='5' fill='%23fbbf24'/%3E%3Crect x='9' y='9' width='5' height='5' fill='%2322c55e'/%3E%3C/svg%3E"
    />
    <title>Tetris</title>
    <style>
      body {
        margin: 0;
        background: #1a1a2e;
        color: #e0e0e0;
        font-family: monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .stage {
        display: flex;
        gap: 24px;
        align-items: flex-start;
      }
      canvas {
        background: #0f0f1e;
        border: 2px solid #4a4a6e;
      }
      .sidebar {
        display: flex;
        flex-direction: column;
        gap: 16px;
        min-width: 140px;
      }
      .sidebar h2 {
        margin: 0 0 4px;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #9a9ac0;
      }
      .panel {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .panel span {
        font-size: 22px;
      }
      .hint {
        margin-top: 16px;
        font-size: 14px;
        text-align: center;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <canvas id="board" width="300" height="600"></canvas>
      <div class="sidebar">
        <div>
          <h2>Next</h2>
          <canvas id="next" width="120" height="120"></canvas>
        </div>
        <div class="panel">
          <h2>Score</h2>
          <span id="score">0</span>
        </div>
        <div class="panel">
          <h2>Lines</h2>
          <span id="lines">0</span>
        </div>
        <div class="panel">
          <h2>Level</h2>
          <span id="level">1</span>
        </div>
      </div>
    </div>
    <p class="hint">
      Use the <strong>arrow keys</strong> to play.<br />
      &larr; &rarr; to move, &uarr; to turn the blocks, &darr; to soft drop,<br />
      <strong>Space</strong> to hard drop.
    </p>
    <script type="module" src="/dist/main.js"></script>
  </body>
</html>
