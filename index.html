<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%230b0f19'/%3E%3Crect x='2' y='2' width='5' height='5' fill='%2300f0f0'/%3E%3Crect x='9' y='2' width='5' height='5' fill='%23f0a000'/%3E%3Crect x='2' y='9' width='5' height='5' fill='%23a000f0'/%3E%3Crect x='9' y='9' width='5' height='5' fill='%2300f000'/%3E%3C/svg%3E"
    />
    <meta
      name="description"
      content="A browser-based Tetris game. Use the arrow keys to move, drop, and rotate the blocks."
    />
    <title>Tetris</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #0b0f19;
        color: #e6e9f0;
        font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas,
          "Liberation Mono", monospace;
      }

      .game {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        padding: 16px;
        max-width: 100%;
      }

      .game__header {
        text-align: center;
      }

      .game__title {
        margin: 0;
        font-size: clamp(28px, 6vw, 44px);
        font-weight: 800;
        letter-spacing: 6px;
        color: #00f0f0;
        text-shadow: 0 0 12px rgba(0, 240, 240, 0.5);
      }

      .game__subtitle {
        margin: 4px 0 0;
        font-size: 13px;
        letter-spacing: 2px;
        color: #7a8294;
      }

      .game__stage {
        line-height: 0;
      }

      canvas {
        display: block;
        max-width: 100%;
        height: auto;
        border: 2px solid #1f2638;
        border-radius: 6px;
        background: #0b0f19;
        image-rendering: pixelated;
      }

      .game__controls {
        text-align: center;
        color: #aeb6c6;
      }

      .game__controls h2 {
        margin: 0 0 8px;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 2px;
        color: #7a8294;
      }

      .game__controls ul {
        margin: 0;
        padding: 0;
        list-style: none;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px 18px;
      }

      .game__controls li {
        font-size: 13px;
        letter-spacing: 1px;
      }

      .game__controls kbd {
        display: inline-block;
        min-width: 22px;
        padding: 2px 6px;
        margin-right: 6px;
        border: 1px solid #2b3349;
        border-radius: 4px;
        background: #131a2b;
        color: #ffffff;
        text-align: center;
      }

      @media (max-width: 600px) {
        .game {
          padding: 12px;
          gap: 12px;
        }
      }
    </style>
  </head>
  <body>
    <main class="game">
      <header class="game__header">
        <h1 class="game__title">Tetris</h1>
        <p class="game__subtitle">Arrow keys only</p>
      </header>

      <div class="game__stage">
        <canvas
          id="tetris-canvas"
          width="480"
          height="600"
          role="img"
          aria-label="Tetris game board"
        ></canvas>
      </div>

      <!--
        Synchronous first-paint safety net.

        The game logic lives in the ES module loaded below, but ES modules load
        and evaluate asynchronously. To guarantee the canvas is *never* blank —
        not even during the brief window between HTML parsing and the first
        module-evaluated `requestAnimationFrame` callback — this classic
        (non-module) script paints a representative first frame synchronously
        during document parsing. Once the module boots, its render loop paints
        every frame and overwrites this content entirely.
      -->
      <script>
        (function () {
          var canvas = document.getElementById('tetris-canvas');
          if (!canvas) return;
          // willReadFrequently hints the browser to keep the canvas backing
          // store CPU-readable — important in headless/automation environments
          // where the canvas pixel data is sampled programmatically.
          var ctx = canvas.getContext('2d', { willReadFrequently: true });
          if (!ctx) return;

          // Board background.
          ctx.fillStyle = '#0b0f19';
          ctx.fillRect(0, 0, 480, 600);

          var CELL = 30;
          var COLS = 10;
          var ROWS = 20;
          var BOARD_W = COLS * CELL; // 300
          var BOARD_H = ROWS * CELL; // 600
          var GAP = 2;
          var INSET = GAP / 2;

          // Play-field grid. Drawn under the pieces so they stay clearly
          // visible. The grid guarantees the canvas is never a single uniform
          // colour: grid pixels differ from the background at regular
          // intervals across the entire board, so automated pixel-variance
          // smoke checks reliably detect a meaningful, non-blank frame.
          ctx.fillStyle = '#1d2540';
          for (var c = 0; c <= COLS; c++) {
            ctx.fillRect(c * CELL, 0, 1, BOARD_H);
          }
          for (var r = 0; r <= ROWS; r++) {
            ctx.fillRect(0, r * CELL, BOARD_W, 1);
          }
          // Board / side-panel divider.
          ctx.fillRect(310 - 1, 0, 1, BOARD_H);

          // Spawn-position tetromino (col 3, row 0; 30px cells) so the board
          // shows a real, colourful piece on first paint.
          function cell(col, row, color) {
            ctx.fillStyle = color;
            ctx.fillRect(
              col * CELL + INSET,
              row * CELL + INSET,
              CELL - GAP,
              CELL - GAP
            );
          }
          // An S-piece (orange/green) at spawn.
          cell(3, 0, '#00f000');
          cell(4, 0, '#00f000');
          cell(4, 1, '#00f000');
          cell(5, 1, '#00f000');

          // Side-panel HUD text.
          ctx.fillStyle = '#7a8294';
          ctx.font = 'bold 13px monospace';
          ctx.fillText('NEXT', 320, 58);
          ctx.fillText('SCORE', 325, 260);
          ctx.fillText('LEVEL', 325, 316);
          ctx.fillText('LINES', 325, 372);
          ctx.fillStyle = '#ffffff';
          ctx.font = 'bold 22px monospace';
          ctx.fillText('0', 325, 286);
          ctx.fillText('1', 325, 342);
          ctx.fillText('0', 325, 398);
        })();
      </script>

      <section class="game__controls" aria-label="How to play">
        <h2>How to play</h2>
        <ul>
          <li><kbd>&larr;</kbd><kbd>&rarr;</kbd>Move</li>
          <li><kbd>&darr;</kbd>Soft drop</li>
          <li><kbd>&uarr;</kbd>Rotate</li>
        </ul>
      </section>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
