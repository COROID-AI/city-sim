<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%230b0f19'/%3E%3Crect x='2' y='2' width='5' height='5' fill='%2300f0f0'/%3E%3Crect x='9' y='2' width='5' height='5' fill='%23f0a000'/%3E%3Crect x='2' y='9' width='5' height='5' fill='%23a000f0'/%3E%3Crect x='9' y='9' width='5' height='5' fill='%2300f000'/%3E%3C/svg%3E"
    />
    <title>Tetris</title>
    <meta
      name="description"
      content="A browser-based Tetris game controlled with the arrow keys."
    />
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #0b0f19;
        color: #ffffff;
        font-family: 'Courier New', Courier, monospace;
      }

      #app {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        padding: 16px;
      }

      .title {
        margin: 0;
        font-size: clamp(28px, 6vw, 44px);
        font-weight: 800;
        letter-spacing: 0.4em;
        color: #00f0f0;
        text-shadow: 0 0 12px rgba(0, 240, 240, 0.5);
      }

      .game-layout {
        display: flex;
        gap: 24px;
        align-items: flex-start;
      }

      #tetris-canvas {
        background: #0b0f19;
        border: 2px solid #1e2638;
        border-radius: 6px;
        max-width: 100%;
        height: auto;
        image-rendering: pixelated;
      }

      .controls {
        width: 160px;
        padding: 12px 14px;
        background: #111827;
        border: 1px solid #1e2638;
        border-radius: 6px;
        color: #c9d1d9;
        font-size: 13px;
        line-height: 1.6;
      }

      .controls h2 {
        margin: 0 0 8px;
        font-size: 12px;
        letter-spacing: 0.2em;
        color: #7a8294;
      }

      .controls ul {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .controls li {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }

      .controls .key {
        display: inline-block;
        min-width: 24px;
        text-align: center;
        padding: 2px 5px;
        background: #1f2937;
        border: 1px solid #374151;
        border-radius: 4px;
        color: #ffffff;
        font-weight: bold;
      }

      .tagline {
        margin: 0;
        font-size: 12px;
        letter-spacing: 0.15em;
        color: #7a8294;
        text-align: center;
      }

      @media (max-width: 600px) {
        .game-layout {
          flex-direction: column;
          align-items: center;
        }

        .controls {
          width: 100%;
          max-width: 480px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <h1 class="title">TETRIS</h1>
      <div class="game-layout">
        <canvas id="tetris-canvas" width="480" height="600"></canvas>
        <aside class="controls" aria-label="Game controls">
          <h2>CONTROLS</h2>
          <ul>
            <li><span class="key">&larr;</span> Move left</li>
            <li><span class="key">&rarr;</span> Move right</li>
            <li><span class="key">&darr;</span> Soft drop</li>
            <li><span class="key">&uarr;</span> Rotate</li>
          </ul>
        </aside>
      </div>
      <p class="tagline">Arrow keys only &mdash; clear the lines!</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
