<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tetris</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='%230f0'/></svg>"
    />
    <style>
      :root {
        --bg: #111;
        --panel: #1a1a2e;
        --text: #eee;
        --accent: #0f0;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Courier New", Courier, monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
      }

      .game-container {
        display: flex;
        gap: 24px;
        align-items: flex-start;
        padding: 24px;
      }

      .board-wrapper {
        position: relative;
      }

      #board {
        background: #000;
        border: 2px solid #333;
        display: block;
      }

      .sidebar {
        display: flex;
        flex-direction: column;
        gap: 16px;
        min-width: 160px;
      }

      .preview-panel {
        background: var(--panel);
        border: 2px solid #333;
        padding: 12px;
        text-align: center;
      }

      .preview-panel h3 {
        font-size: 14px;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #888;
      }

      #next {
        background: #000;
        display: block;
        margin: 0 auto;
      }

      .hud {
        background: var(--panel);
        border: 2px solid #333;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .hud-row {
        display: flex;
        justify-content: space-between;
        font-size: 16px;
      }

      .hud-label {
        color: #888;
        text-transform: uppercase;
        font-size: 12px;
        letter-spacing: 1px;
      }

      .hud-value {
        font-weight: bold;
        font-size: 18px;
      }

      #start-btn {
        background: var(--accent);
        color: #000;
        border: none;
        padding: 14px;
        font-size: 16px;
        font-weight: bold;
        font-family: inherit;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 2px;
        transition: opacity 0.2s;
      }

      #start-btn:hover {
        opacity: 0.85;
      }

      .controls-hint {
        font-size: 11px;
        color: #666;
        line-height: 1.6;
      }

      .overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 12px;
        background: rgba(0, 0, 0, 0.75);
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s;
        text-align: center;
      }

      .overlay.visible {
        opacity: 1;
      }

      .overlay h2 {
        font-size: 24px;
        color: var(--accent);
      }

      .overlay p {
        font-size: 14px;
        color: #aaa;
      }
    </style>
  </head>
  <body>
    <div class="game-container">
      <div class="board-wrapper">
        <canvas id="board"></canvas>
        <div class="overlay" id="overlay">
          <h2 id="overlay-title">Tetris</h2>
          <p id="overlay-text">Press Start to play</p>
        </div>
      </div>
      <div class="sidebar">
        <div class="preview-panel">
          <h3>Next</h3>
          <canvas id="next"></canvas>
        </div>
        <div class="hud">
          <div class="hud-row">
            <span class="hud-label">Score</span>
            <span class="hud-value" id="score">0</span>
          </div>
          <div class="hud-row">
            <span class="hud-label">Level</span>
            <span class="hud-value" id="level">1</span>
          </div>
          <div class="hud-row">
            <span class="hud-label">Lines</span>
            <span class="hud-value" id="lines">0</span>
          </div>
        </div>
        <button id="start-btn">Start</button>
        <div class="controls-hint">
          &larr; &rarr; Move<br />
          &uarr; Rotate<br />
          &darr; Soft Drop
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
